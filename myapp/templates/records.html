{% extends "base.html" %}
{% load static %}
{% block main %}

<link rel="stylesheet" href="{% static 'css/index.css' %}">

<div class="card shadow-sm">
  <div class="card-header bg-success text-white">
    <h5 class="mb-0">
      <i class="fa-solid fa-clock-rotate-left me-2"></i>
      Classification History
    </h5>
  </div>

  <div class="card-body">

    <table class="table table-hover">
      <thead class="table-light">
        <tr>
          <th>Image</th>
          <th>Prediction</th>
          <th>Confidence</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody>
        {% for record in records %}
        <tr>
          <td>
            <img src="{{ record.image.url }}" width="70" class="rounded record-img"
     data-pred="{{ record.prediction }}"
     data-confidence="{{ record.confidence }}"
     data-datetime="{{ record.created_at }}">
          </td>

          <td>
            <span class="badge bg-success">
              {{ record.prediction }}
            </span>
          </td>

          <td>{{ record.confidence }}%</td>

          <td>{{ record.created_at }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

  </div>
</div>

<!-- Modal -->
<div id="imgModal" class="modal" style="display:none;">
  <span class="close">&times;</span>
  <img class="modal-content" id="modalImg">
  <div id="caption" style="color:white; text-align:center; margin-top:10px;"></div>
</div>

<style>
.modal {
  position: fixed;
  z-index: 1000;
  padding-top: 60px;
  left: 0; top: 0;
  width: 100%; height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.9);
}

.modal-content {
  margin: auto;
  display: block;
  max-width: 80%;
  max-height: 80%;
  border-radius: 10px;
}

.close {
  position: absolute;
  top: 30px;
  right: 40px;
  color: white;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}
</style>

<script>
document.querySelectorAll('.record-img').forEach(img => {
    img.addEventListener('click', function(){
        const modal = document.getElementById('imgModal');
        const modalImg = document.getElementById('modalImg');
        const caption = document.getElementById('caption');

        modal.style.display = "block";
        modalImg.src = this.src;
        caption.innerHTML = `<strong>Prediction:</strong> ${this.dataset.pred} |
                             <strong>Confidence:</strong> ${this.dataset.confidence}% |
                             <strong>Date:</strong> ${this.dataset.datetime}`;
    });
});

document.querySelector('.close').addEventListener('click', function(){
    document.getElementById('imgModal').style.display = "none";
});
</script>

{% endblock main %}
