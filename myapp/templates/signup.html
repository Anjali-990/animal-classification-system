{% extends "base.html" %}
{% load static %}
{% block main %}

<link rel="stylesheet" href="{% static 'css/index.css' %}">

<div class="d-flex justify-content-center align-items-center fullscreen-center">
  <div class="signup-container">
    <h2><i class="fas fa-user-plus"></i> Sign Up</h2>

    <!-- Django form -->
    <form method="post" autocomplete="off">
      {% csrf_token %}

      <!-- Username -->
      <label for="id_username" class="form-label">Username:</label>
      <input 
        type="text" 
        name="username" 
        id="id_username" 
        class="form-control" 
        placeholder="Username" 
        required 
        autocomplete="off"
      />

      <!-- Email (optional) -->
      <label for="id_email" class="form-label mt-2">Email:</label>
      <input 
        type="email" 
        name="email" 
        id="id_email" 
        class="form-control" 
        placeholder="Email (optional)" 
        autocomplete="off"
      />

      <!-- Password -->
      <label for="id_password1" class="form-label mt-2">Password:</label>
      <input 
        type="password" 
        name="password1" 
        id="id_password1" 
        class="form-control" 
        required 
        autocomplete="new-password"
      />

      <!-- Confirm Password -->
      <label for="id_password2" class="form-label mt-2">Confirm Password:</label>
      <input 
        type="password" 
        name="password2" 
        id="id_password2" 
        class="form-control" 
        required 
        autocomplete="new-password"
      />

      <button type="submit" class="btn btn-success w-100 mt-3">Sign Up</button>
    </form>

    <!-- Display errors if any -->
    {% if form.errors %}
      <div class="mt-3" style="color:red;">
        {{ form.errors }}
      </div>
    {% endif %}

    <div class="switch mt-3 text-center">
      <p>
        Already have an account? <a href="{% url 'login' %}">Login here</a>.
      </p>
    </div>
  </div>
</div>

{% endblock main %}
