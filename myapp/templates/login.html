{% extends "base.html" %}
{% load static %}
{% block main %}

<link rel="stylesheet" href="{% static 'css/index.css' %}">

<div class="d-flex justify-content-center fullscreen-center">
  <div class="login-container">
    <h2 class="text-center mb-4"><i class="fas fa-sign-in-alt"></i> Login</h2>

    <!-- Display form errors -->
    {% if form.errors %}
      <p style="color: red; text-align: center;">
        Invalid username or password
      </p>
    {% endif %}

    <form method="post" autocomplete="off">
      {% csrf_token %}

      <!-- Username / Email -->
      <label for="id_username" class="form-label">Username:</label>
      <input
        type="text"
        name="username"
        id="id_username"
        class="form-control mb-3"
        placeholder="Enter your username "
        required
        autocomplete="off"
      />

      <!-- Password -->
      <label for="id_password" class="form-label">Password:</label>
      <input
        type="password"
        name="password"
        id="id_password"
        class="form-control mb-3"
        placeholder="Enter your password"
        required
        autocomplete="current-password"
      />

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="switch mt-3 text-center">
      <p>
        Don't have an account? <a href="{% url 'signup' %}">Signup here</a>.
      </p>
    </div>
  </div>
</div>

{% endblock main %}
